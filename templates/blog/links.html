{% extends 'base.html' %}

{% block title %}友情链接 - 我的博客{% endblock %}

{% block content %}
<div class="page-header">
    <h1>友情链接</h1>
</div>

<div class="links-list">
    {% for link in links %}
    <div class="link-card">
        {% if link.logo %}
        <img src="{{ link.logo.url }}" alt="{{ link.name }}" class="link-logo">
        {% endif %}
        <div class="link-info">
            <h3><a href="{{ link.url }}" target="_blank" rel="noopener">{{ link.name }}</a></h3>
            {% if link.description %}
            <p>{{ link.description }}</p>
            {% endif %}
        </div>
    </div>
    {% empty %}
    <p class="no-links">暂无友情链接</p>
    {% endfor %}
</div>
{% endblock %}
