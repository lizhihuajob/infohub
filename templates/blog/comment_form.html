{% extends 'base.html' %}

{% block title %}发表评论 - 我的博客{% endblock %}

{% block content %}
<div class="comment-form-page">
    <h2>发表评论</h2>
    <form action="" method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="author_name">姓名 *</label>
            <input type="text" id="author_name" name="author_name" required>
        </div>
        <div class="form-group">
            <label for="author_email">邮箱 *</label>
            <input type="email" id="author_email" name="author_email" required>
        </div>
        <div class="form-group">
            <label for="author_url">网址</label>
            <input type="url" id="author_url" name="author_url">
        </div>
        <div class="form-group">
            <label for="content">评论内容 *</label>
            <textarea id="content" name="content" rows="5" required></textarea>
        </div>
        <button type="submit">提交评论</button>
    </form>
    <p class="comment-notice">提示: 评论提交后需要审核才会显示</p>
</div>
{% endblock %}
