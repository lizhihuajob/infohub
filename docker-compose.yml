version: '3.8'

services:
  # Django后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blog_backend
    restart: always
    volumes:
      - ./backend:/app
      - sqlite_data:/db
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=blog.settings
    command: >
      sh -c "python manage.py runserver 0.0.0.0:8000"

  # Vue前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blog_frontend
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    command: >
      sh -c "npm run dev"
    depends_on:
      - backend

volumes:
  sqlite_data:
