# Docker Compose配置文件
# 用于编排整个博客应用的服务
version: '3.8'

services:
  # Django后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blog_backend
    restart: unless-stopped
    volumes:
      # 挂载代码目录，便于开发调试
      - ./backend:/app
      # 持久化媒体文件
      - backend_media:/app/media
      # 持久化数据库文件
      - backend_db:/app/data
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=blog_project.settings
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    networks:
      - blog_network

  # Vue前端开发服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: blog_frontend
    restart: unless-stopped
    volumes:
      # 挂载代码目录，支持热更新
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    networks:
      - blog_network

# 数据卷定义
volumes:
  backend_db:
    driver: local
  backend_media:
    driver: local

# 网络定义
networks:
  blog_network:
    driver: bridge
