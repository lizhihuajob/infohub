# Docker Compose 配置文件
# 定义个人博客项目的多容器应用

version: '3.8'

services:
  # Django 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blog_backend
    volumes:
      # 挂载代码目录，便于开发时实时更新
      - ./backend:/app
      # 持久化 SQLite 数据库文件
      - ./data/db:/app/data
      # 持久化媒体文件
      - ./data/media:/app/data/media
    ports:
      - "8000:8000"
    environment:
      # Django 环境变量配置
      - DEBUG=1
      - SECRET_KEY=dev-secret-key-change-in-production
      - ALLOWED_HOSTS=*
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    networks:
      - blog_network

  # Vue 前端开发服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blog_frontend
    volumes:
      # 挂载代码目录，便于开发时实时更新
      - ./frontend:/app
      # 持久化 node_modules，避免重新安装
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      # Vite 开发服务器配置
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    networks:
      - blog_network

  # Nginx 反向代理服务（生产环境使用）
  nginx:
    image: nginx:alpine
    container_name: blog_nginx
    ports:
      - "80:80"
    volumes:
      # 挂载 Nginx 配置文件
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 挂载前端构建产物
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - blog_network
    # 开发环境下不自动启动 Nginx
    profiles:
      - production

# 定义共享网络
networks:
  blog_network:
    driver: bridge

# 定义数据卷
volumes:
  db_data:
